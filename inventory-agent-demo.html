<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>库存管理 Agent - 移动端 Demo</title>
  <style>
    /* CSS Variables - CamScanner Brand */
    :root {
      --primary: #2DB84B;
      --primary-dark: #1A8C35;
      --primary-light: #E8F5E9;
      --bg: #F5F5F5;
      --white: #FFFFFF;
      --text: #333333;
      --text-secondary: #999999;
      --text-light: #CCCCCC;
      --border: #EEEEEE;
      --warning: #FF9800;
      --danger: #F44336;
      --success: #4CAF50;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #E0E0E0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Phone Frame */
    #phone {
      width: 375px;
      height: 812px;
      background: var(--white);
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative;
    }

    /* Page System */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      background: var(--bg);
    }

    .page.active {
      display: flex;
    }

    /* Slide Animation */
    @keyframes slideInRight {
      from {
        transform: translateX(100%);
      }
      to {
        transform: translateX(0);
      }
    }

    .slide-in-right {
      animation: slideInRight 0.3s ease-out;
    }

    /* Top Bar */
    .top-bar {
      background: var(--primary-dark);
      color: var(--white);
      padding-top: 48px;
      flex-shrink: 0;
    }

    .top-bar-inner {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text);
    }

    .top-bar-inner .back-btn {
      font-size: 24px;
      cursor: pointer;
      color: var(--text);
    }

    .top-bar-inner .title {
      font-size: 18px;
      font-weight: 600;
    }

    .top-bar-inner .right {
      width: 24px;
    }

    /* Bottom Tab Bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding-bottom: 20px;
      z-index: 100;
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }

    .tab-item.active {
      color: var(--primary);
    }

    .tab-item .icon {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .tab-center {
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 28px;
      cursor: pointer;
      position: relative;
      top: -20px;
      box-shadow: 0 4px 12px rgba(45, 184, 75, 0.4);
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      color: var(--white);
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      z-index: 10000;
      display: none;
      max-width: 80%;
      text-align: center;
    }

    #toast.show {
      display: block;
      animation: fadeInOut 2s ease-in-out;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      10%, 90% { opacity: 1; }
    }

    /* Loading Overlay */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #loading-overlay.show {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Common Components */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: center;
    }

    .btn-primary:active {
      background: var(--primary-dark);
    }

    .section-title {
      font-size: 14px;
      color: var(--text-secondary);
      padding: 16px;
      font-weight: 600;
    }

    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .tag.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }
  </style>
</head>

    // Helper Functions
    function calcStock() {
      const stockMap = {};

      // Initialize all SKUs with 0 quantity
      SKUS.forEach(sku => {
        stockMap[sku.id] = {
          skuId: sku.id,
          name: sku.name,
          spec: sku.spec,
          unit: sku.unit,
          price: sku.price,
          qty: 0
        };
      });

      // Process all documents
      DOCUMENTS.forEach(doc => {
        doc.items.forEach(item => {
          if (stockMap[item.skuId]) {
            if (doc.direction === 'IN') {
              stockMap[item.skuId].qty += item.qty;
            } else if (doc.direction === 'OUT') {
              stockMap[item.skuId].qty -= item.qty;
            }
          }
        });
      });

      // Convert to array and sort by quantity descending
      return Object.values(stockMap).sort((a, b) => b.qty - a.qty);
    }

    const STOCK = calcStock();

    function getDocsByDirection(direction) {
      return DOCUMENTS
        .filter(doc => doc.direction === direction)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
    }

      return DOCUMENTS

        .sort((a, b) => new Date(b.date) - new Date(a.date));

    function formatAmount(amount) {
      return '¥' + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${month}/${day} ${hours}:${minutes}`;
    }

    // =============================================

    let pageHistory = [];

    function navigateTo(pageId, skipAnimation = false) {
      const currentPage = document.querySelector('.page.active');
      const targetPage = document.getElementById(pageId);

      if (!targetPage) {
        console.error('Page not found:', pageId);
        return;
      }

      // Remove active from current page
      if (currentPage) {
        currentPage.classList.remove('active');
      }

      // Add to history
      pageHistory.push(pageId);

      // Activate target page
      targetPage.classList.add('active');

      // Add animation if not skipped
      if (!skipAnimation) {
        targetPage.classList.add('slide-in-right');
        setTimeout(() => {
          targetPage.classList.remove('slide-in-right');
        }, 300);
      }

      // Scroll to top
      targetPage.scrollTop = 0;
    }

    function goBack() {
      if (pageHistory.length <= 1) {
        return;
      }

      // Remove current page from history
      pageHistory.pop();

      // Get previous page
      const previousPageId = pageHistory[pageHistory.length - 1];
      const currentPage = document.querySelector('.page.active');
      const previousPage = document.getElementById(previousPageId);

      if (!previousPage) {
        console.error('Previous page not found:', previousPageId);
        return;
      }

      // Remove active from current page
      if (currentPage) {
        currentPage.classList.remove('active');
      }

      // Remove last item from history since navigateTo will add it back
      pageHistory.pop();

      // Navigate to previous page
      navigateTo(previousPageId, true);
    }

    // =============================================
    // UI Utilities
    // =============================================

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    function showLoading(text = '加载中...') {
      const overlay = document.getElementById('loading-overlay');
      overlay.classList.add('show');
    }

    function hideLoading() {
      const overlay = document.getElementById('loading-overlay');
      overlay.classList.remove('show');
    }

    // =============================================
    // Initialize
    // =============================================

    document.addEventListener('DOMContentLoaded', () => {
      console.log('Inventory Agent Demo - Ready');
      console.log('Mock data loaded:', {
        suppliers: SUPPLIERS.length,
        customers: CUSTOMERS.length,
        skus: SKUS.length,
        documents: DOCUMENTS.length,
        purchaseOrders: PURCHASE_ORDERS.length,
        stock: STOCK.length
      });
    });
  </script>
